<section class="page page-pickup-scan" data-page="pickup-scan" aria-labelledby="pickup-scan-title">
  <h1 id="pickup-scan-title">Scan Pickup</h1>
  <div class="scanner-viewport">
    <video id="pickup-scanner-video" playsinline autoplay muted aria-label="Pratinjau kamera scan pickup"></video>
    <div class="scanner-frame" aria-hidden="true"></div>
  </div>
  <div id="pickup-scan-list" class="scanner-multi-list">
    <p><span id="pickup-scan-count">0</span> paket dipindai untuk pickup</p>
    <ul id="pickup-scan-items"></ul>
  </div>
  <button class="btn btn--primary btn--block" id="btn-finish-pickup" type="button">Selesai Pickup</button>
</section>
