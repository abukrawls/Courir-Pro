<section class="page page-deliveries" data-page="deliveries" aria-labelledby="deliveries-title">
  <h1 id="deliveries-title" class="visually-hidden">Daftar Paket</h1>

  <div class="search-bar">
    <span class="material-icon" aria-hidden="true">search</span>
    <input type="search" id="input-search-package" placeholder="Cari resi, nama, HP, alamat, status, tanggal...">
    <button class="icon-btn" id="btn-search-filter" aria-label="Filter pencarian" type="button">
      <span class="material-icon" aria-hidden="true">tune</span>
    </button>
  </div>

  <div class="tabs" role="tablist" aria-label="Status paket" id="delivery-tabs">
    <button class="tab is-active" role="tab" aria-selected="true" data-status="todo" type="button">To Do</button>
    <button class="tab" role="tab" aria-selected="false" data-status="in_progress" type="button">Dalam Perjalanan</button>
    <button class="tab" role="tab" aria-selected="false" data-status="done" type="button">Selesai</button>
    <button class="tab" role="tab" aria-selected="false" data-status="postponed" type="button">Ditunda</button>
    <button class="tab" role="tab" aria-selected="false" data-status="failed" type="button">Gagal</button>
    <button class="tab" role="tab" aria-selected="false" data-status="return" type="button">Return</button>
    <button class="tab" role="tab" aria-selected="false" data-status="titipan" type="button">Titipan</button>
    <button class="tab" role="tab" aria-selected="false" data-status="all" type="button">Semua</button>
  </div>

  <div class="list-toolbar">
    <span id="delivery-count-label">0 paket</span>
    <div class="sort-controls">
      <button class="sort-chip" id="btn-sort-time" type="button" data-sort="time" aria-label="Urutkan berdasarkan waktu">
        <span class="material-icon" aria-hidden="true">schedule</span>
        <span class="material-icon sort-chip__arrow" aria-hidden="true">arrow_downward</span>
      </button>
      <button class="sort-chip" id="btn-sort-name" type="button" data-sort="name" aria-label="Urutkan berdasarkan nama">
        <span>A-Z</span>
        <span class="material-icon sort-chip__arrow" aria-hidden="true">arrow_downward</span>
      </button>
    </div>
  </div>

  <div id="delivery-list" class="package-list" aria-live="polite">
    <!-- Kartu paket dibuat langsung oleh DashboardController.renderPackageCard() di JS -->
  </div>

  <div id="delivery-empty" class="empty-state" hidden>
    <span class="material-icon" aria-hidden="true">inventory_2</span>
    <p>Tidak ada paket pada status ini</p>
  </div>
</section>
