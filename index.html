<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2E5AAC">
<title>Courier Pro</title>
<meta name="description" content="Aplikasi kurir profesional — offline first, sinkron otomatis.">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=block">

<!-- CSS: base -->
<link rel="stylesheet" href="css/base/reset.css">
<link rel="stylesheet" href="css/base/variables.css">
<link rel="stylesheet" href="css/base/typography.css">
<!-- CSS: layouts -->
<link rel="stylesheet" href="css/layouts/header.css">
<link rel="stylesheet" href="css/layouts/bottom-nav.css">
<link rel="stylesheet" href="css/layouts/drawer.css">
<link rel="stylesheet" href="css/layouts/grid.css">
<!-- CSS: components -->
<link rel="stylesheet" href="css/components/card.css">
<link rel="stylesheet" href="css/components/button.css">
<link rel="stylesheet" href="css/components/badge.css">
<link rel="stylesheet" href="css/components/tabs.css">
<link rel="stylesheet" href="css/components/bottom-sheet.css">
<link rel="stylesheet" href="css/components/fab.css">
<link rel="stylesheet" href="css/components/skeleton.css">
<link rel="stylesheet" href="css/components/toast.css">
<link rel="stylesheet" href="css/components/modal.css">
<link rel="stylesheet" href="css/components/form.css">
<!-- CSS: pages (dimuat lazy oleh router, ditautkan di sini untuk versi awal) -->
<link rel="stylesheet" href="css/pages/login.css">
<link rel="stylesheet" href="css/pages/dashboard.css">
<link rel="stylesheet" href="css/pages/deliveries.css">
<link rel="stylesheet" href="css/pages/package-detail.css">
<link rel="stylesheet" href="css/pages/scanner.css">
<link rel="stylesheet" href="css/pages/pickup-return.css">
<link rel="stylesheet" href="css/pages/absensi.css">
<link rel="stylesheet" href="css/pages/laporan.css">
<link rel="stylesheet" href="css/pages/dompet.css">
<link rel="stylesheet" href="css/pages/setting.css">
<link rel="stylesheet" href="css/pages/admin.css">
</head>
<body>

<!-- App Shell: header, konten dinamis (diisi router), bottom navigation -->
<div id="app-root">

  <a class="skip-link" href="#app-main">Langsung ke konten</a>

  <header id="app-header" class="app-header" role="banner" hidden>
    <button id="btn-menu" class="icon-btn" aria-label="Buka menu" type="button">
      <span class="material-icon" aria-hidden="true">menu</span>
    </button>
    <h1 id="app-header-title" class="app-header__title">Courier Pro</h1>
    <div class="app-header__status" aria-live="polite">
      <span id="status-connection" class="status-dot" data-state="offline" title="Status koneksi"></span>
      <button id="btn-notification" class="icon-btn" aria-label="Notifikasi" type="button">
        <span class="material-icon" aria-hidden="true">notifications</span>
        <span id="badge-notification" class="badge" hidden>0</span>
      </button>
    </div>
  </header>

  <nav id="app-drawer" class="app-drawer" aria-label="Menu utama" hidden aria-hidden="true">
    <div class="app-drawer__profile">
      <img id="drawer-avatar" class="avatar" src="assets/images/avatar-placeholder.svg" alt="">
      <div>
        <p id="drawer-name" class="app-drawer__name">-</p>
        <p id="drawer-id" class="app-drawer__id">-</p>
      </div>
    </div>
    <ul id="drawer-menu" class="app-drawer__menu" role="list"></ul>
    <button id="btn-logout" class="app-drawer__logout" type="button">
      <span class="material-icon" aria-hidden="true">logout</span> Keluar
    </button>
  </nav>
  <div id="drawer-scrim" class="drawer-scrim" hidden></div>

  <main id="app-main" class="app-main" role="main" aria-live="polite">
    <!-- Router menyuntikkan isi halaman (pages/*.html) di sini -->
    <div id="page-container"></div>
  </main>

  <nav id="bottom-nav" class="bottom-nav" aria-label="Navigasi bawah" hidden>
    <button class="bottom-nav__item" data-route="dashboard" type="button">
      <span class="material-icon" aria-hidden="true">home</span><span>Beranda</span>
    </button>
    <button class="bottom-nav__item" data-route="deliveries" type="button">
      <span class="material-icon" aria-hidden="true">local_shipping</span><span>Paket</span>
    </button>
    <button class="bottom-nav__item bottom-nav__item--fab" data-route="scanner" type="button" aria-label="Pindai">
      <span class="material-icon" aria-hidden="true">qr_code_scanner</span>
    </button>
    <button class="bottom-nav__item" data-route="kinerja" type="button">
      <span class="material-icon" aria-hidden="true">insights</span><span>Kinerja</span>
    </button>
    <button class="bottom-nav__item" data-route="setting" type="button">
      <span class="material-icon" aria-hidden="true">settings</span><span>Setting</span>
    </button>
  </nav>

  <div id="toast-container" class="toast-container" aria-live="assertive"></div>
  <div id="global-loader" class="global-loader" hidden aria-hidden="true">
    <div class="spinner" role="status" aria-label="Memuat"></div>
  </div>
</div>

<!-- Supabase client dimuat secara dinamis (non-blocking) oleh js/config/supabase-config.js -->
<!-- JS: config & core (urutan penting) -->
<script src="js/config/constants.js"></script>
<script src="js/config/supabase-config.js"></script>
<script src="js/utils/dom.js"></script>
<script src="js/utils/format.js"></script>
<script src="js/utils/validation.js"></script>
<script src="js/utils/image.js"></script>
<script src="js/core/db.js"></script>
<script src="js/core/state.js"></script>
<script src="js/core/router.js"></script>
<script src="js/core/sync-engine.js"></script>
<!-- JS: services -->
<script src="js/services/auth.service.js"></script>
<script src="js/services/package.service.js"></script>
<script src="js/services/scanner.service.js"></script>
<script src="js/services/gps.service.js"></script>
<script src="js/services/notification.service.js"></script>
<script src="js/services/wallet.service.js"></script>
<script src="js/services/report.service.js"></script>
<script src="js/services/attendance.service.js"></script>
<!-- JS: controllers -->
<script src="js/controllers/login.controller.js"></script>
<script src="js/controllers/dashboard.controller.js"></script>
<script src="js/controllers/deliveries.controller.js"></script>
<script src="js/controllers/package-detail.controller.js"></script>
<script src="js/controllers/scanner.controller.js"></script>
<script src="js/controllers/status-update.controller.js"></script>
<script src="js/controllers/pickup.controller.js"></script>
<script src="js/controllers/pickup-scan.controller.js"></script>
<script src="js/controllers/return.controller.js"></script>
<script src="js/controllers/queue.controller.js"></script>
<script src="js/controllers/absensi.controller.js"></script>
<script src="js/controllers/laporan.controller.js"></script>
<script src="js/controllers/kinerja.controller.js"></script>
<script src="js/controllers/dompet.controller.js"></script>
<script src="js/controllers/transfer.controller.js"></script>
<script src="js/controllers/notifikasi.controller.js"></script>
<script src="js/controllers/setting.controller.js"></script>
<script src="js/controllers/admin.controller.js"></script>
<!-- App entry -->
<script src="js/app.js"></script>
</body>
</html>
